<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="pc.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zafer's Portfolio</title>
    <style>
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #010103;
        color: #f1f1f1;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        transition:
          opacity 220ms ease,
          visibility 220ms ease;
      }

      #boot-loader.boot-loader--hide {
        opacity: 0;
        visibility: hidden;
      }

      .boot-loader__content {
        display: grid;
        gap: 18px;
        justify-items: center;
      }

      .boot-loader__spinner {
        width: 42px;
        height: 42px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #f1f1f1;
        border-radius: 999px;
        animation: boot-loader-spin 900ms linear infinite;
      }

      .boot-loader__label {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
      }

      @keyframes boot-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" role="status" aria-live="polite">
      <div class="boot-loader__content">
        <span class="boot-loader__spinner" aria-hidden="true"></span>
        <p class="boot-loader__label">Loading...</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
